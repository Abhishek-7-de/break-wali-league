<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Live Team Dashboard - Break Wali League</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700;800&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Outfit', sans-serif; background-color: #020617; color: #f8fafc; overflow-x: hidden; }
    .glass-panel { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.05); }
    .rank-1 { color: #fbbf24; text-shadow: 0 0 10px rgba(251, 191, 36, 0.5); }
    .rank-2 { color: #94a3b8; }
    .rank-3 { color: #b45309; }
    
    .pulse-dot {
      height: 10px; width: 10px; background-color: #22c55e; border-radius: 50%; display: inline-block;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.7); }
      70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(34, 197, 94, 0); }
      100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(34, 197, 94, 0); }
    }
    
    tr { transition: all 0.2s ease; }
    tr:hover { background-color: rgba(255,255,255,0.03); transform: scale(1.01); }
  </style>
</head>
<body class="min-h-screen p-4 md:p-8">

  <div class="max-w-6xl mx-auto">
    <!-- Header -->
    <header class="flex flex-col md:flex-row justify-between items-center mb-8 glass-panel p-6 rounded-2xl shadow-2xl">
      <div>
        <h1 class="text-4xl font-extrabold bg-clip-text text-transparent bg-gradient-to-r from-orange-400 to-rose-400 uppercase tracking-wider">
          Break Wali League
        </h1>
        <p class="text-slate-400 mt-2 font-medium">Internal Team Live Dashboard</p>
      </div>
      <div class="mt-4 md:mt-0 flex items-center bg-slate-800/50 px-5 py-3 rounded-full border border-slate-700">
        <span class="pulse-dot mr-3"></span>
        <span class="font-bold tracking-widest text-sm uppercase text-slate-300">Live Sync Active</span>
      </div>
    </header>

    <!-- Stats Overview -->
    <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
      <div class="glass-panel p-6 rounded-2xl text-center">
        <div class="text-slate-400 text-sm uppercase tracking-wider font-bold mb-1">Total Players</div>
        <div class="text-3xl font-black text-white" id="stat-players">-</div>
      </div>
      <div class="glass-panel p-6 rounded-2xl text-center">
        <div class="text-slate-400 text-sm uppercase tracking-wider font-bold mb-1">Total Points Scored</div>
        <div class="text-3xl font-black text-orange-400" id="stat-points">-</div>
      </div>
      <div class="glass-panel p-6 rounded-2xl text-center">
        <div class="text-slate-400 text-sm uppercase tracking-wider font-bold mb-1">Total Runs</div>
        <div class="text-3xl font-black text-emerald-400" id="stat-runs">-</div>
      </div>
      <div class="glass-panel p-6 rounded-2xl text-center">
        <div class="text-slate-400 text-sm uppercase tracking-wider font-bold mb-1">Total Wickets</div>
        <div class="text-3xl font-black text-rose-400" id="stat-wickets">-</div>
      </div>
    </div>

    <!-- Leaderboard Table -->
    <div class="glass-panel rounded-2xl overflow-hidden shadow-2xl">
      <div class="overflow-x-auto">
        <table class="w-full text-left border-collapse">
          <thead>
            <tr class="bg-slate-800/80 text-slate-300 text-xs uppercase tracking-widest border-b border-slate-700">
              <th class="p-5 font-bold w-20 text-center">Rank</th>
              <th class="p-5 font-bold">Player</th>
              <th class="p-5 font-bold">Phone</th>
              <th class="p-5 font-bold text-right">Points</th>
              <th class="p-5 font-bold text-right">Matches</th>
              <th class="p-5 font-bold text-right">Runs</th>
              <th class="p-5 font-bold text-right">Wickets</th>
            </tr>
          </thead>
          <tbody id="leaderboard-body" class="text-sm">
            <tr>
              <td colspan="7" class="p-8 text-center text-slate-400">Loading live database...</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js';
    import { getFirestore, collection, query, orderBy, limit, onSnapshot } from 'https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js';

    // Same config as the game
    const firebaseConfig = {
      apiKey: "AIzaSyBExkLl-cG5KSbeXzP5P4K_oSmxJgu1Q-I",
      authDomain: "break-wali-league-5c94b.firebaseapp.com",
      projectId: "break-wali-league-5c94b",
      storageBucket: "break-wali-league-5c94b.firebasestorage.app",
      messagingSenderId: "672522390930",
      appId: "1:672522390930:web:93e9853c765a40d214c54b"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const tbody = document.getElementById('leaderboard-body');
    const statPlayers = document.getElementById('stat-players');
    const statPoints = document.getElementById('stat-points');
    const statRuns = document.getElementById('stat-runs');
    const statWickets = document.getElementById('stat-wickets');

    // Fetch top 500
    const q = query(collection(db, 'users'), orderBy('totalPoints', 'desc'), limit(500));
    
    onSnapshot(q, (snapshot) => {
      let html = '';
      let rank = 1;
      let sumPoints = 0, sumRuns = 0, sumWickets = 0;
      
      snapshot.forEach((doc) => {
        const u = doc.data();
        // Calculate totals for header stats
        sumPoints += (u.totalPoints || 0);
        sumRuns += (u.runs || 0);
        sumWickets += (u.wickets || 0);

        // Format rank color
        let rankClass = 'text-slate-500 font-bold';
        if(rank === 1) rankClass = 'rank-1 font-black text-lg';
        else if(rank === 2) rankClass = 'rank-2 font-black text-lg';
        else if(rank === 3) rankClass = 'rank-3 font-black text-lg';

        // Mask phone slightly for privacy on team dash
        const safePhone = u.phone ? u.phone.replace('+91','').substring(0,2) + '******' + u.phone.substring(u.phone.length-2) : 'N/A';

        html += `
          <tr class="border-b border-slate-700/50">
            <td class="p-5 text-center ${rankClass}">#${rank}</td>
            <td class="p-5">
              <div class="font-bold text-white text-base">${u.name || 'Unknown'}</div>
              <div class="text-xs text-slate-400 mt-1">${u.nickname ? '@'+u.nickname : ''}</div>
            </td>
            <td class="p-5 font-mono text-slate-400 text-xs tracking-wider">${safePhone}</td>
            <td class="p-5 text-right font-black text-orange-400 text-lg">${(u.totalPoints || 0).toLocaleString()}</td>
            <td class="p-5 text-right font-medium text-slate-300">${u.matchesPlayed || 0}</td>
            <td class="p-5 text-right font-medium text-emerald-400">${u.runs || 0}</td>
            <td class="p-5 text-right font-medium text-rose-400">${u.wickets || 0}</td>
          </tr>
        `;
        rank++;
      });

      tbody.innerHTML = html;
      statPlayers.textContent = snapshot.size;
      statPoints.textContent = sumPoints.toLocaleString();
      statRuns.textContent = sumRuns.toLocaleString();
      statWickets.textContent = sumWickets.toLocaleString();
    });
  </script>
</body>
</html>
